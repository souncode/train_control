<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project Editor - {{ project_name }}</title>
    <style>
        :root {
            --bg: #0b1220;
            --panel: #111a2e;
            --line: #25324a;
            --text: #e6edf8;
            --muted: #8ea0ba;
            --primary: #3b82f6;
            --ok: #16a34a;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(180deg, #0a1120 0%, #0b1220 100%);
            color: var(--text);
        }
        .container {
            max-width: 1880px;
            margin: 0 auto;
            padding: 18px;
        }
        .top {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .title { font-size: 20px; font-weight: 800; }
        .small { color: var(--muted); font-size: 12px; }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        button {
            border: 0;
            border-radius: 10px;
            padding: 9px 13px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-light { background: #1a2438; color: var(--text); border: 1px solid #2c3b55; }
        .btn-ok { background: var(--ok); color: #05200d; }
        .btn-danger { background: var(--danger); color: #fff; }

        .layout {
            display: grid;
            grid-template-columns: 1.8fr 0.9fr;
            gap: 14px;
        }
        .layout-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0 14px;
            flex-wrap: wrap;
        }
        .action-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: -2px 0 14px;
            flex-wrap: wrap;
        }
        .layout-control label {
            font-size: 12px;
            color: var(--muted);
        }
        .layout-control input[type=\"range\"] {
            width: 260px;
        }
        .card {
            border: 1px solid var(--line);
            border-radius: 14px;
            background: var(--panel);
            padding: 12px;
        }

        .canvas-wrap {
            width: 100%;
            min-height: 700px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #2f405f;
            border-radius: 12px;
            background: #0c1425;
            overflow: auto;
            position: relative;
        }
        #editorCanvas {
            display: block;
            max-width: 100%;
            height: auto;
            cursor: crosshair;
            background: #0b1220;
        }
        .class-popup {
            position: absolute;
            min-width: 220px;
            max-width: 320px;
            max-height: 260px;
            overflow: auto;
            background: #0f182a;
            border: 1px solid #2f405f;
            border-radius: 12px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
            padding: 6px;
            z-index: 30;
        }
        .class-popup.hidden { display: none; }
        .class-popup-item {
            width: 100%;
            text-align: left;
            background: transparent;
            color: var(--text);
            border: 0;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 12px;
            font-weight: 600;
        }
        .class-popup-item:hover,
        .class-popup-item.active {
            background: #1a2740;
        }

        .field { margin-top: 10px; }
        .field label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            color: var(--muted);
        }
        input, select, textarea {
            width: 100%;
            border: 1px solid #304160;
            border-radius: 10px;
            padding: 9px 10px;
            background: #0f182a;
            color: var(--text);
        }
        textarea {
            min-height: 130px;
            resize: vertical;
            font-family: Consolas, monospace;
            font-size: 12px;
        }

        .row { display: flex; gap: 8px; align-items: center; }
        .row.wrap { flex-wrap: wrap; }

        .class-list {
            border: 1px solid #2f405f;
            border-radius: 10px;
            background: #0f182a;
            padding: 8px 10px;
            max-height: 150px;
            overflow: auto;
            font-family: Consolas, monospace;
            font-size: 12px;
            line-height: 1.45;
        }
        .image-list {
            border: 1px solid #2f405f;
            border-radius: 10px;
            background: #0f182a;
            max-height: 260px;
            overflow: auto;
            position: relative;
        }
        .image-table-head {
            display: grid;
            grid-template-columns: 54px minmax(0, 1.45fr) 0.95fr 138px 92px 0.7fr;
            gap: 0;
            border: 1px solid #2f405f;
            border-bottom: 0;
            border-radius: 10px 10px 0 0;
            background: #12203a;
            overflow: hidden;
        }
        .image-table-head .cell {
            padding: 6px 8px;
            border-right: 1px solid #243550;
            font-size: 11px;
            font-weight: 700;
            color: #b8cae6;
            text-transform: uppercase;
        }
        .image-table-head .cell:last-child { border-right: 0; }
        .image-head-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            background: transparent;
            color: inherit;
            border: 0;
            border-radius: 0;
            padding: 0;
            font: inherit;
            text-transform: inherit;
        }
        .image-head-btn:hover { color: #e6edf8; }
        .image-head-label {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .image-head-sort {
            flex: 0 0 auto;
            color: #7ea2d8;
            font-size: 11px;
            min-width: 14px;
            text-align: right;
        }
        .image-head-controls {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }
        .image-head-filter {
            width: 100%;
            border: 1px solid #2b3f60;
            border-radius: 6px;
            padding: 4px 6px;
            background: #0f182a;
            color: #d5e4fb;
            font-size: 11px;
            font-weight: 600;
        }
        .image-head-number {
            width: 100%;
            border: 1px solid #2b3f60;
            border-radius: 6px;
            padding: 4px 6px;
            background: #0f182a;
            color: #d5e4fb;
            font-size: 11px;
            font-weight: 600;
        }
        .bbox-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 12px;
            margin: 8px 0 6px;
            font-size: 11px;
            color: #a9bddc;
        }
        .bbox-legend-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .bbox-legend-swatch {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            border: 1px solid #304160;
        }
        .bbox-legend-swatch.less { background: rgba(239, 68, 68, 0.32); }
        .bbox-legend-swatch.equal { background: rgba(34, 197, 94, 0.32); }
        .bbox-legend-swatch.greater { background: rgba(245, 158, 11, 0.32); }
        .bbox-legend-swatch.notequal { background: rgba(59, 130, 246, 0.28); }
        .image-list.table-mode {
            border-radius: 0 0 10px 10px;
        }
        .image-item {
            border-bottom: 1px solid #1f2b41;
            font-size: 12px;
            cursor: pointer;
            display: grid;
            grid-template-columns: 54px minmax(0, 1.45fr) 0.95fr 138px 92px 0.7fr;
            gap: 0;
            align-items: stretch;
        }
        .image-item:last-child { border-bottom: 0; }
        .image-item.active { background: #1a2740; }
        .image-item:hover { background: #142038; }
        .image-item.bbox-less { background: rgba(239, 68, 68, 0.14); }
        .image-item.bbox-equal { background: rgba(34, 197, 94, 0.14); }
        .image-item.bbox-greater { background: rgba(245, 158, 11, 0.14); }
        .image-item.bbox-notequal { background: rgba(59, 130, 246, 0.12); }
        .image-item.bbox-less.active { background: rgba(239, 68, 68, 0.24); }
        .image-item.bbox-equal.active { background: rgba(34, 197, 94, 0.24); }
        .image-item.bbox-greater.active { background: rgba(245, 158, 11, 0.24); }
        .image-item.bbox-notequal.active { background: rgba(59, 130, 246, 0.2); }
        .image-item .cell {
            padding: 7px 10px;
            border-right: 1px solid #1f2b41;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .image-item .cell:last-child { border-right: 0; }
        .image-item .cell.name {
            white-space: normal;
            overflow-wrap: anywhere;
            line-height: 1.25;
        }
        .image-item-meta { color: #8ea0ba; font-size: 11px; }
        .image-item-index { color: #cfe0fb; font-variant-numeric: tabular-nums; }
        .image-item-anomaly {
            font-weight: 700;
        }
        .image-item-anomaly.has {
            color: #ff8f8f;
        }
        .image-item-anomaly.clean {
            color: #7dd3a6;
        }
        .image-list-spacer {
            position: relative;
            width: 100%;
        }
        .image-list-window {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
        }

        .box-list {
            border: 1px solid #2f405f;
            border-radius: 10px;
            background: #0f182a;
            max-height: 220px;
            overflow: auto;
        }
        .box-item {
            padding: 8px 10px;
            border-bottom: 1px solid #1f2b41;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }
        .box-item:last-child { border-bottom: 0; }
        .box-item.active { background: #1a2740; }

        .status-line {
            margin-top: 8px;
            font-size: 12px;
            color: #9dd6ff;
        }
        .load-progress {
            margin-top: 8px;
            border: 1px solid #2c3b55;
            border-radius: 10px;
            background: #0f182a;
            padding: 8px 10px;
        }
        .load-progress.hidden { display: none; }
        .load-progress-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 6px;
            font-size: 12px;
            color: #cfe6ff;
        }
        .load-progress-bar {
            height: 8px;
            border-radius: 999px;
            overflow: hidden;
            background: #18253a;
        }
        .load-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3b82f6 0%, #22c55e 100%);
            transition: width 0.18s ease;
        }
        .hint { color: #93a4bf; font-size: 12px; margin-top: 6px; }
        .image-info {
            margin-top: 10px;
            border: 1px solid #2c3b55;
            border-radius: 10px;
            background: #0f182a;
            padding: 10px;
            font-size: 12px;
            line-height: 1.5;
        }
        .image-info a {
            color: #7cc6ff;
            text-decoration: none;
            word-break: break-all;
        }
        .image-info a:hover { text-decoration: underline; }

        @media (max-width: 1100px) {
            .layout { grid-template-columns: 1fr; }
            .canvas-wrap { min-height: 360px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top">
        <div>
            <div class="title">Project Label Editor</div>
            <div class="small">Project: <b>{{ project_name }}</b></div>
        </div>
        <div class="actions">
            <button class="btn-light" onclick="window.location.href='/'">Back</button>
        </div>
    </div>

    <div class="layout-control">
        <label for="layoutRatio">Độ rộng khung ảnh</label>
        <input id="layoutRatio" type="range" min="1.2" max="2.4" step="0.05" value="1.8" oninput="onLayoutRatioChanged(this.value)">
        <span class="small" id="layoutRatioText">1.8fr</span>
    </div>

    <div class="action-toolbar">
        <button class="btn-ok" onclick="saveLabel()">Save ảnh</button>
        <button class="btn-primary" id="promoteTrainBtn" onclick="saveLabelAndMoveToTrain()" style="display:none">Save + Move to train</button>
        <button class="btn-primary" onclick="nextImage()">Next ảnh</button>
        <button class="btn-light" onclick="selectAllBoxes()">Select all</button>
        <button class="btn-danger" onclick="deleteSelectedBoxes()">Xóa bbox đã chọn</button>
        <button class="btn-danger" onclick="deleteSelectedBox()">Xóa bbox hiện tại</button>
        <button class="btn-light" id="toggleBboxBtn" onclick="toggleBboxVisible()">Ẩn bbox</button>
    </div>

    <div class="layout">
        <div class="card">
            <div class="canvas-wrap">
                <canvas id="editorCanvas"></canvas>
                <div id="classPopup" class="class-popup hidden"></div>
            </div>
            <div class="status-line" id="statusLine">Loading...</div>
            <div class="load-progress hidden" id="loadProgress">
                <div class="load-progress-head">
                    <span id="loadProgressText">Loading...</span>
                    <span id="loadProgressPct">0%</span>
                </div>
                <div class="load-progress-bar">
                    <div class="load-progress-fill" id="loadProgressFill"></div>
                </div>
            </div>
            <div class="hint">Kéo thả bbox để đổi vị trí. Click bbox để chọn.</div>
            <div class="image-info" id="imageInfo">
                <div><b>Tên:</b> -</div>
                <div><b>Ngày sửa:</b> -</div>
                <div><b>Link:</b> -</div>
                <div><b>Tổng ảnh:</b> -</div>
            </div>
        </div>

        <div class="card">
            <div class="field">
                <label>Ảnh (toàn bộ)</label>
                <input id="imageSearch" type="text" placeholder="Tìm theo tên ảnh..." oninput="onImageSearchChanged()" />
            </div>

            <div class="field">
                <label>Danh sách ảnh</label>
                <div class="row wrap" style="margin-bottom:8px;">
                    <span class="small" id="pageInfo">0 ảnh</span>
                </div>
                <div class="bbox-legend">
                    <span class="bbox-legend-item"><span class="bbox-legend-swatch less"></span>Thiếu</span>
                    <span class="bbox-legend-item"><span class="bbox-legend-swatch equal"></span>Đúng</span>
                    <span class="bbox-legend-item"><span class="bbox-legend-swatch greater"></span>Dư</span>
                    <span class="bbox-legend-item"><span class="bbox-legend-swatch notequal"></span>Khác</span>
                </div>
                <div class="image-table-head" id="imageTableHead"></div>
                <div class="image-list table-mode" id="imageList"></div>
            </div>

            <div class="field">
                <label>Class list (từ class.txt)</label>
                <div class="class-list" id="classList">Loading classes...</div>
            </div>

            <div class="field">
                <label>Bounding boxes</label>
                <div class="box-list" id="boxList"></div>
            </div>

            <div class="field">
                <label>Class của bbox đang chọn</label>
                <div class="row">
                    <select id="boxClassSelect" onchange="changeSelectedBoxClass()"></select>
                </div>
            </div>

            <div class="field">
                <label>Raw label (.txt)</label>
                <textarea id="rawLabel" readonly></textarea>
            </div>
        </div>
    </div>
</div>

<script>
const projectName = {{ project_name | tojson }};
const editorQuery = new URLSearchParams(window.location.search);
const initialRel = editorQuery.get('rel') || '';
const initialValidRel = editorQuery.get('valid_rel') || '';
let images = [];
let imageItems = [];
let idx = 0;
let classes = [];
let currentPage = 1;
let pageSize = 1000000;
let totalImages = 0;
let totalPages = 0;
let currentQuery = '';
let sortBy = 'name';
let sortDir = 'asc';
let classFilter = '';
let expectedBoxCount = '';
let boxCompare = 'all';
let anomalyFilter = 'all';
let anomalySensitivity = 'medium';
let pendingInitialRel = initialRel;
let promoteValidRel = initialValidRel;
let layoutLeftFr = 1.8;
let bboxVisible = true;
const imageRowHeight = 52;
const imageListOverscan = 10;

let canvas = null;
let ctx = null;
let baseImg = null;
let drawW = 0;
let drawH = 0;

let boxes = []; // [{cls, x, y, w, h}] in canvas pixels
let selectedBox = -1;
let selectedBoxes = new Set();
let dragging = false;
let drawMode = 'none'; // none | move | resize | draw
let resizeHandle = ''; // nw|ne|sw|se
let dragStart = {x: 0, y: 0};
let dragOffset = {x: 0, y: 0};
let classPopupState = { visible: false, boxIndex: -1 };
let currentImageAnomalyItems = [];

function esc(text) {
    return String(text ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
}

async function apiGet(url, opts = {}) {
    const res = await fetch(url, opts);
    const data = await res.json();
    if (!res.ok || data.ok === false) {
        throw new Error(data.message || `HTTP ${res.status}`);
    }
    return data;
}

function setStatus(text) {
    document.getElementById('statusLine').textContent = text;
}

function setEditorLoadProgress(percent, text = 'Loading...') {
    const box = document.getElementById('loadProgress');
    const textEl = document.getElementById('loadProgressText');
    const pctEl = document.getElementById('loadProgressPct');
    const fillEl = document.getElementById('loadProgressFill');
    if (!box || !textEl || !pctEl || !fillEl) return;

    const pct = Math.max(0, Math.min(100, Number(percent) || 0));
    textEl.textContent = String(text || 'Loading...');
    pctEl.textContent = `${pct.toFixed(0)}%`;
    fillEl.style.width = `${pct}%`;
    box.classList.remove('hidden');
}

function hideEditorLoadProgress() {
    const box = document.getElementById('loadProgress');
    if (!box) return;
    box.classList.add('hidden');
}

function getClassPopupEl() {
    return document.getElementById('classPopup');
}

function hideClassPopup() {
    const el = getClassPopupEl();
    if (!el) return;
    classPopupState.visible = false;
    classPopupState.boxIndex = -1;
    el.classList.add('hidden');
    el.innerHTML = '';
}

function updatePromoteButton() {
    const btn = document.getElementById('promoteTrainBtn');
    if (!btn) return;
    const currentRel = String(images[idx] || '');
    const enabled = !!promoteValidRel && !!initialRel && currentRel.toLowerCase() === String(initialRel || '').toLowerCase();
    btn.style.display = enabled ? '' : 'none';
}

function applyLayoutRatio(leftFrRaw) {
    const leftFr = Math.max(1.2, Math.min(2.4, Number(leftFrRaw || 1.8)));
    layoutLeftFr = leftFr;
    const rightFr = Math.max(0.7, 3.0 - leftFr);

    const layout = document.querySelector('.layout');
    if (layout) {
        if (window.innerWidth <= 1100) {
            layout.style.gridTemplateColumns = '1fr';
        } else {
            layout.style.gridTemplateColumns = `${leftFr.toFixed(2)}fr ${rightFr.toFixed(2)}fr`;
        }
    }

    const txt = document.getElementById('layoutRatioText');
    if (txt) txt.textContent = `${leftFr.toFixed(2)}fr`;
}

function onLayoutRatioChanged(v) {
    applyLayoutRatio(v);
    try {
        localStorage.setItem('project_editor_left_fr', String(layoutLeftFr));
    } catch (e) {
        // ignore storage errors
    }
}

function setImageInfo(name, modifiedAt, linkHref) {
    const box = document.getElementById('imageInfo');
    if (!box) return;
    const safeName = esc(name || '-');
    const safeDate = esc(modifiedAt || '-');
    const safeLink = esc(linkHref || '-');
    box.innerHTML = `
        <div><b>Tên:</b> ${safeName}</div>
        <div><b>Ngày sửa:</b> ${safeDate}</div>
        <div><b>Link:</b> ${safeLink}</div>
        <div><b>Tổng ảnh:</b> ${totalImages}</div>
    `;
}

function updatePageInfo() {
    const el = document.getElementById('pageInfo');
    if (!el) return;
    el.textContent = `${totalImages} ảnh`;
}

function sortIndicatorFor(field) {
    if (sortBy !== field) return '↕';
    return sortDir === 'desc' ? '↓' : '↑';
}

function renderImageTableHead() {
    const head = document.getElementById('imageTableHead');
    if (!head) return;
    const classOptions = ['<option value="">Tất cả</option>']
        .concat(classes.map((name, i) => `<option value="${i}" ${String(classFilter) === String(i) ? 'selected' : ''}>${esc(i)}: ${esc(name)}</option>`))
        .join('');
    const anomalyOptions = [
        ['all', 'Tất cả'],
        ['has', 'Có ABN'],
        ['clean', 'Sạch'],
    ].map(([value, label]) => `<option value="${value}" ${anomalyFilter === value ? 'selected' : ''}>${esc(label)}</option>`).join('');
    const anomalySensitivityOptions = [
        ['low', 'Nhẹ'],
        ['medium', 'Vừa'],
        ['high', 'Nhạy'],
    ].map(([value, label]) => `<option value="${value}" ${anomalySensitivity === value ? 'selected' : ''}>${esc(label)}</option>`).join('');
    const boxCompareOptions = [
        ['all', 'Tất cả'],
        ['less', 'Thiếu'],
        ['equal', 'Đúng'],
        ['greater', 'Dư'],
        ['notequal', 'Khác'],
    ].map(([value, label]) => `<option value="${value}" ${boxCompare === value ? 'selected' : ''}>${esc(label)}</option>`).join('');

    head.innerHTML = `
        <div class="cell">#</div>
        <div class="cell">
            <button type="button" class="image-head-btn" onclick="toggleImageSort('name')" title="Sort theo tên ảnh">
                <span class="image-head-label">Tên ảnh</span>
                <span class="image-head-sort">${sortIndicatorFor('name')}</span>
            </button>
        </div>
        <div class="cell">
            <button type="button" class="image-head-btn" onclick="toggleImageSort('date')" title="Sort theo ngày sửa">
                <span class="image-head-label">Ngày sửa</span>
                <span class="image-head-sort">${sortIndicatorFor('date')}</span>
            </button>
        </div>
        <div class="cell">
            <div class="image-head-controls">
                <button type="button" class="image-head-btn" title="So sánh số bbox">
                    <span class="image-head-label">BBox</span>
                    <span class="image-head-sort"></span>
                </button>
                <input
                    type="number"
                    min="0"
                    class="image-head-number"
                    id="expectedBoxCountHead"
                    placeholder="Số kỳ vọng"
                    value="${esc(expectedBoxCount)}"
                    oninput="onExpectedBoxCountChanged(this.value)"
                >
                <select class="image-head-filter" id="boxCompareHead" onchange="onBoxCompareChanged(this.value)">
                    ${boxCompareOptions}
                </select>
            </div>
        </div>
        <div class="cell">
            <div class="image-head-controls">
                <button type="button" class="image-head-btn" title="Bbox bất thường theo trung bình class">

function toggleBboxVisible() {
    bboxVisible = !bboxVisible;
    const btn = document.getElementById('toggleBboxBtn');
    if (btn) btn.textContent = bboxVisible ? 'Ẩn bbox' : 'Hiện bbox';
    draw();
}

function classNameByIndex(i) {
    if (i >= 0 && i < classes.length) return classes[i];
    return `class_${i}`;
}

function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
}

function canvasPointFromEvent(e) {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height);
    return { x, y };
}

function hitBoxIndex(x, y) {
    for (let i = boxes.length - 1; i >= 0; i--) {
        const b = boxes[i];
        if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
            return i;
        }
    }
    return -1;
}

function getBoxLabelRect(b) {
    const label = `${b.cls}: ${classNameByIndex(b.cls)}`;
    ctx.font = '12px Segoe UI';
    const tw = ctx.measureText(label).width + 10;
    const th = 18;
    const tx = b.x;
    const ty = Math.max(0, b.y - th);
    return {
        x: tx,
        y: ty,
        w: tw,
        h: th,
    };
}

function hitBoxLabelIndex(x, y) {
    if (!ctx) return -1;
    for (let i = boxes.length - 1; i >= 0; i--) {
        const b = boxes[i];
        const r = getBoxLabelRect(b);
        if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
            return i;
        }
    }
    return -1;
}

function handlePoints(b) {
    return {
        nw: {x: b.x, y: b.y},
        ne: {x: b.x + b.w, y: b.y},
        sw: {x: b.x, y: b.y + b.h},
        se: {x: b.x + b.w, y: b.y + b.h},
    };
}

function hitResizeHandle(x, y, b) {
    const pts = handlePoints(b);
    const r = 9;
    for (const key of ['nw', 'ne', 'sw', 'se']) {
        const p = pts[key];
        if (Math.abs(x - p.x) <= r && Math.abs(y - p.y) <= r) {
            return key;
        }
    }
    return '';
}

function parseYoloLabel(text, anomalyIndexSet = null) {
    const rows = [];
    let boxIndex = 0;
    const lines = String(text || '').replace(/\r\n/g, '\n').split('\n');
    for (const line of lines) {
        const s = line.trim();
        if (!s) continue;
        const parts = s.split(/\s+/);
        if (parts.length < 5) continue;

        const cls = parseInt(parts[0], 10);
        const cx = parseFloat(parts[1]);
        const cy = parseFloat(parts[2]);
        const w = parseFloat(parts[3]);
        const h = parseFloat(parts[4]);

        if ([cls, cx, cy, w, h].some(v => Number.isNaN(v))) continue;

        const bw = clamp(w, 0, 1) * drawW;
        const bh = clamp(h, 0, 1) * drawH;
        const x = clamp(cx, 0, 1) * drawW - bw / 2;
        const y = clamp(cy, 0, 1) * drawH - bh / 2;
        rows.push({
            cls: Math.max(0, cls),
            x: clamp(x, 0, Math.max(0, drawW - bw)),
            y: clamp(y, 0, Math.max(0, drawH - bh)),
            w: clamp(bw, 1, drawW),
            h: clamp(bh, 1, drawH),
            isAnomaly: !!(anomalyIndexSet && anomalyIndexSet.has(boxIndex)),
        });
        boxIndex += 1;
    }
    return rows;
}

function toYoloText() {
    return boxes.map(b => {
        const cx = (b.x + b.w / 2) / drawW;
        const cy = (b.y + b.h / 2) / drawH;
        const w = b.w / drawW;
        const h = b.h / drawH;
        return `${Math.max(0, Math.floor(b.cls))} ${cx.toFixed(6)} ${cy.toFixed(6)} ${w.toFixed(6)} ${h.toFixed(6)}`;
    }).join('\n');
}

function renderRawText() {
    document.getElementById('rawLabel').value = toYoloText();
}

function getAnomalyItemByBoxIndex(boxIndex) {
    return currentImageAnomalyItems.find(item => Number(item.box_index) === Number(boxIndex)) || null;
}

function formatAnomalyReasonText(anomalyItem) {
    if (!anomalyItem || !Array.isArray(anomalyItem.reasons) || anomalyItem.reasons.length === 0) return '';
    return anomalyItem.reasons.map(reason => {
        if (String(reason.metric || '') === 'name') {
            const actual = String(reason.group_name || reason.value || '').trim();
            const expected = String(reason.best_group || '').trim();
            return `NAME ${actual} -> ${expected}`;
        }
        const metric = String(reason.metric || '').toUpperCase();
        const value = Number(reason.value || 0).toFixed(2);
        const mean = Number(reason.mean || 0).toFixed(2);
        return `${metric} ${value} / avg ${mean}`;
    }).join(', ');
}

function renderClassSelect() {

function showClassPopupForBox(boxIndex, rect) {
    const el = getClassPopupEl();

        ? classes.map((name, i) => `
            <button
                type="button"

        : `<button type="button" class="class-popup-item active" onclick="selectClassFromPopup(${boxIndex}, ${currentCls})">${esc(currentCls)}: ${esc(classNameByIndex(currentCls))}</button>`;

function selectClassFromPopup(boxIndex, clsIndex) {
    if (boxIndex < 0 || !boxes[boxIndex]) return;

    selectedBoxes = new Set([boxIndex]);
    hideClassPopup();
    draw();
    setStatus(`Đã đổi class bbox #${boxIndex + 1} -> ${classNameByIndex(boxes[boxIndex].cls)}`);
}

function draw() {
    if (!ctx || !baseImg) return;
    ctx.clearRect(0, 0, drawW, drawH);
    ctx.drawImage(baseImg, 0, 0, drawW, drawH);

    if (!bboxVisible) {
        renderBoxList();
        renderClassSelect();
        renderRawText();
        return;
    }

    boxes.forEach((b, i) => {
        const active = selectedBoxes.has(i);
        const anomaly = !!b.isAnomaly;
        ctx.lineWidth = active ? 3 : 2;
        ctx.strokeStyle = active ? '#22c55e' : (anomaly ? '#ef4444' : '#3b82f6');
        ctx.fillStyle = active ? 'rgba(34,197,94,0.16)' : (anomaly ? 'rgba(239,68,68,0.14)' : 'rgba(59,130,246,0.16)');

        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.strokeRect(b.x, b.y, b.w, b.h);

        const label = `${anomaly ? '! ' : ''}${b.cls}: ${classNameByIndex(b.cls)}`;
        ctx.font = '12px Segoe UI';
        const tw = ctx.measureText(label).width + 10;
        const th = 18;
        const tx = b.x;
        const ty = Math.max(0, b.y - th);
        ctx.fillStyle = active ? 'rgba(34,197,94,0.95)' : (anomaly ? 'rgba(239,68,68,0.95)' : 'rgba(59,130,246,0.95)');
        ctx.fillRect(tx, ty, tw, th);
        ctx.fillStyle = '#001020';
        ctx.fillText(label, tx + 5, ty + 13);

        if (i === selectedBox) {
            const pts = handlePoints(b);
            ctx.fillStyle = '#22c55e';
            for (const key of ['nw', 'ne', 'sw', 'se']) {
                const p = pts[key];
                ctx.fillRect(p.x - 4, p.y - 4, 8, 8);
            }
        }
    });

    renderBoxList();
    renderClassSelect();
    renderRawText();
}

function selectBox(i) {
    hideClassPopup();
    selectedBox = i;
    selectedBoxes = new Set([i]);
    const anomalyText = formatAnomalyReasonText(getAnomalyItemByBoxIndex(i));
    if (anomalyText) {
        setStatus(`BBox #${i + 1} bất thường: ${anomalyText}`);
    }
    draw();
}

function changeSelectedBoxClass() {
    if (selectedBox < 0 || !boxes[selectedBox]) return;
    const sel = document.getElementById('boxClassSelect');
    const cls = parseInt(sel.value, 10);
    if (Number.isNaN(cls)) return;
    boxes[selectedBox].cls = cls;
    hideClassPopup();
    draw();
}

function deleteSelectedBox() {
    if (selectedBox < 0 || !boxes[selectedBox]) return;
    hideClassPopup();
    boxes.splice(selectedBox, 1);
    selectedBoxes = new Set();
    selectedBox = boxes.length ? Math.min(selectedBox, boxes.length - 1) : -1;
    if (selectedBox >= 0) selectedBoxes.add(selectedBox);
    draw();
}

function selectAllBoxes() {
    selectedBoxes = new Set(boxes.map((_, i) => i));
    selectedBox = boxes.length ? 0 : -1;
    draw();
}

function deleteSelectedBoxes() {
    if (!selectedBoxes.size) return;
    hideClassPopup();
    boxes = boxes.filter((_, i) => !selectedBoxes.has(i));
    selectedBoxes = new Set();
    selectedBox = boxes.length ? 0 : -1;
    if (selectedBox >= 0) selectedBoxes.add(selectedBox);
    draw();
}

function renderImageList() {
    const box = document.getElementById('imageList');
    if (!box) return;
    if (!imageItems.length) {
        box.innerHTML = '<div class=\"image-item\"><div class=\"cell\" style=\"grid-column:1 / -1\">Không có ảnh</div></div>';
        return;
    }

    const viewportHeight = Math.max(box.clientHeight || 260, 120);
    const scrollTop = Math.max(0, box.scrollTop || 0);
    const total = imageItems.length;
    const start = Math.max(0, Math.floor(scrollTop / imageRowHeight) - imageListOverscan);
    const visibleCount = Math.ceil(viewportHeight / imageRowHeight) + imageListOverscan * 2;
    const end = Math.min(total, start + visibleCount);
    const offsetY = start * imageRowHeight;

    const rows = [];
    for (let i = start; i < end; i += 1) {
        const it = imageItems[i];
        const active = i === idx ? 'active' : '';
        const clsText = Array.isArray(it.class_ids) && it.class_ids.length ? it.class_ids.join(',') : '-';
        const bboxCount = Number(it.bbox_count || 0);
        const anomalyCount = Number(it.bbox_anomaly_count || 0);
        let compareClass = '';
        if (String(expectedBoxCount || '').trim() !== '') {
            const expected = Number(expectedBoxCount);
            if (Number.isFinite(expected)) {
                if (bboxCount < expected) compareClass = 'bbox-less';
                else if (bboxCount > expected) compareClass = 'bbox-greater';
                else compareClass = 'bbox-equal';
                if (boxCompare === 'notequal' && bboxCount !== expected) {
                    compareClass = 'bbox-notequal';
                }
            }
        }
        rows.push(`
            <div class="image-item ${active} ${compareClass}" style="height:${imageRowHeight}px" onclick="selectImageByIndex(${i})">
                <div class="cell image-item-index">${i + 1}</div>
                <div class="cell name" title="${esc(it.name || it.rel)}">${esc(it.name || it.rel)}</div>
                <div class="cell image-item-meta" title="${esc(it.modified_at || '-')}">${esc(it.modified_at || '-')}</div>
                <div class="cell image-item-index" title="BBox: ${bboxCount}">${bboxCount}</div>
                <div class="cell image-item-anomaly ${anomalyCount > 0 ? 'has' : 'clean'}" title="BBox bất thường: ${anomalyCount}">${anomalyCount > 0 ? `! ${anomalyCount}` : '0'}</div>
                <div class="cell image-item-meta" title="${esc(clsText)}">${esc(clsText)}</div>
            </div>
        `);
    }

    box.innerHTML = `
        <div class="image-list-spacer" style="height:${total * imageRowHeight}px">
            <div class="image-list-window" style="transform:translateY(${offsetY}px)">
                ${rows.join('')}
            </div>
        </div>
    `;
}

function ensureImageIndexVisible(targetIndex) {
    const box = document.getElementById('imageList');
    if (!box || targetIndex < 0) return;
    const top = targetIndex * imageRowHeight;
    const bottom = top + imageRowHeight;
    const viewTop = box.scrollTop;
    const viewBottom = viewTop + box.clientHeight;

    if (top < viewTop) {
        box.scrollTop = top;
    } else if (bottom > viewBottom) {
        box.scrollTop = Math.max(0, bottom - box.clientHeight);
    }
}

async function loadImages(page = 1, query = currentQuery) {
    setEditorLoadProgress(5, 'Đang tải danh sách ảnh...');
    currentQuery = String(query || '').trim();
    const targetRel = pendingInitialRel || '';
    const expectedBoxesParam = String(expectedBoxCount || '').trim();
    const data = await apiGet(`/api/project_images?project=${encodeURIComponent(projectName)}&page=${page}&page_size=${pageSize}&q=${encodeURIComponent(currentQuery)}&sort_by=${encodeURIComponent(sortBy)}&sort_dir=${encodeURIComponent(sortDir)}&class_filter=${encodeURIComponent(classFilter)}&expected_boxes=${encodeURIComponent(expectedBoxesParam)}&box_compare=${encodeURIComponent(boxCompare)}&anomaly_filter=${encodeURIComponent(anomalyFilter)}&anomaly_sensitivity=${encodeURIComponent(anomalySensitivity)}&rel=${encodeURIComponent(targetRel)}`);
    setEditorLoadProgress(45, 'Đã nhận danh sách ảnh, đang xử lý...');
    images = Array.isArray(data.images) ? data.images : [];
    imageItems = Array.isArray(data.items) ? data.items : images.map(rel => ({rel, name: rel, modified_at: '-', class_ids: []}));
    currentPage = Number(data.page || 1);
    totalImages = Number(data.total || 0);
    totalPages = Number(data.total_pages || 0);
    updatePageInfo();
    if (!images.length) {
        renderImageList();
        setStatus('Không có ảnh trong thư mục image/images');
        setImageInfo('-', '-', '');
        setEditorLoadProgress(100, 'Không có ảnh');
        setTimeout(() => hideEditorLoadProgress(), 500);
        return;
    }
    idx = 0;
    if (pendingInitialRel) {
        const targetIdx = images.findIndex(x => String(x || '').toLowerCase() === String(pendingInitialRel || '').toLowerCase());
        if (targetIdx >= 0) {
            idx = targetIdx;
        }
        pendingInitialRel = '';
    }
    setEditorLoadProgress(70, 'Đang render danh sách ảnh...');
    renderImageList();
    setEditorLoadProgress(82, 'Đang tải ảnh đầu tiên...');
    await loadCurrentImageAndLabel();
    setEditorLoadProgress(100, 'Đã tải xong');
    setTimeout(() => hideEditorLoadProgress(), 350);
}

async function loadCurrentImageAndLabel() {
    if (!images[idx]) return;
    const rel = images[idx];
    setEditorLoadProgress(10, `Đang tải ảnh: ${rel}`);

    const img = new Image();
    img.src = `/api/project_image_file?project=${encodeURIComponent(projectName)}&rel=${encodeURIComponent(rel)}&t=${Date.now()}`;
    await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
    });
    setEditorLoadProgress(50, 'Đã tải ảnh, đang đọc label...');

    baseImg = img;
    const wrap = document.querySelector('.canvas-wrap');
    const maxW = Math.max(900, Math.floor((wrap ? wrap.clientWidth : 1400) - 24));
    const maxH = Math.max(650, window.innerHeight - 220);
    const ratio = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight, 1);
    drawW = Math.max(1, Math.round(img.naturalWidth * ratio));
    drawH = Math.max(1, Math.round(img.naturalHeight * ratio));

    canvas.width = drawW;
    canvas.height = drawH;

    const data = await apiGet(`/api/project_label?project=${encodeURIComponent(projectName)}&rel=${encodeURIComponent(rel)}&anomaly_sensitivity=${encodeURIComponent(anomalySensitivity)}`);
    setEditorLoadProgress(72, 'Đã đọc label, đang dựng bbox...');
    currentImageAnomalyItems = Array.isArray(data.anomaly_items) ? data.anomaly_items : [];
    const anomalyIndexSet = new Set(Array.isArray(data.anomaly_box_indices) ? data.anomaly_box_indices.map(x => Number(x)) : []);
    boxes = parseYoloLabel(data.text || '', anomalyIndexSet);
    selectedBox = boxes.length ? 0 : -1;
    selectedBoxes = selectedBox >= 0 ? new Set([selectedBox]) : new Set();

    try {
        const info = await apiGet(`/api/project_image_info?project=${encodeURIComponent(projectName)}&rel=${encodeURIComponent(rel)}`);
        setImageInfo(info.name, info.modified_at, info.root_link || info.path || '');
    } catch (e) {
        setImageInfo(rel, '-', '');
    }

    draw();
    const anomalyText = Number(data.bbox_anomaly_count || 0) > 0 ? ` | ABN: ${Number(data.bbox_anomaly_count || 0)}` : '';
    setStatus(`Image ${idx + 1}/${images.length}: ${rel}${anomalyText}`);
    ensureImageIndexVisible(idx);
    renderImageList();
    updatePromoteButton();
    setEditorLoadProgress(100, `Đã tải xong: ${rel}`);
    setTimeout(() => hideEditorLoadProgress(), 250);
}

async function switchToImageIndex(i, options = {}) {
    if (!images.length) return;
    const targetIdx = Math.max(0, Math.min(Number(i || 0), Math.max(0, images.length - 1)));
    const saveCurrent = options.saveCurrent !== false;
    if (targetIdx === idx) return;
    if (saveCurrent && images[idx]) {
        await saveLabel();
    }
    idx = targetIdx;
    ensureImageIndexVisible(idx);
    renderImageList();
    await loadCurrentImageAndLabel();
}

async function selectImageByIndex(i) {
    await switchToImageIndex(i, { saveCurrent: true });
}

async function saveLabel() {
    if (!images[idx]) return;
    const rel = images[idx];
    const text = toYoloText();
    await apiGet('/api/project_label', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ project: projectName, rel, text })
    });
    const anomalyInfo = await refreshCurrentImageAnomalies(rel);
    setCurrentImageStatus(rel, anomalyInfo?.bboxAnomalyCount || 0, 'Đã lưu label');
}

async function saveLabelAndMoveToTrain() {
    if (!images[idx]) return;
    if (!promoteValidRel) {
        setStatus('Ảnh này không có liên kết valid để chuyển sang train');
        return;
    }

    const rel = images[idx];
    const text = toYoloText();
    const data = await apiGet('/api/project/promote_valid_to_train', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            project: projectName,
            source_rel: rel,
            valid_rel: promoteValidRel,
            text
        })
    });
    promoteValidRel = '';
    updatePromoteButton();
    setStatus(`Đã chuyển sang train và xóa khỏi valid: ${data.valid_rel || rel}`);
}

async function nextImage() {
    if (!images.length) return;
    if (idx < images.length - 1) {
        await switchToImageIndex(idx + 1, { saveCurrent: true });
    } else {
        setStatus('Đã tới ảnh cuối cùng');
    }
}

async function prevImage() {
    if (!images.length) return;
    if (idx > 0) {
        await switchToImageIndex(idx - 1, { saveCurrent: true });
    } else {
        setStatus('Đã ở ảnh đầu tiên');
    }
}

function shouldIgnoreEditorHotkeys(target) {
    if (!target) return false;
    const tag = String(target.tagName || '').toUpperCase();
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || tag === 'BUTTON') {
        return true;
    }
    return !!target.closest?.('.class-popup');
}

async function onEditorKeyDown(e) {
    if (shouldIgnoreEditorHotkeys(e.target)) return;
    if (e.defaultPrevented) return;
    if (e.ctrlKey || e.altKey || e.metaKey || e.shiftKey) return;

    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        await nextImage();
        return;
    }

    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        await prevImage();
    }
}

function onMouseDown(e) {
    if (!canvas) return;
    if (!bboxVisible) return;
    const p = canvasPointFromEvent(e);
    dragStart = {x: p.x, y: p.y};

    const labelHit = hitBoxLabelIndex(p.x, p.y);
    if (labelHit >= 0) {
        const labelRect = getBoxLabelRect(boxes[labelHit]);
        showClassPopupForBox(labelHit, labelRect);
        dragging = false;
        drawMode = 'none';
        resizeHandle = '';
        draw();
        return;
    }

    const hit = hitBoxIndex(p.x, p.y);
    if (hit >= 0) {
        hideClassPopup();
        selectedBox = hit;
        selectedBoxes = new Set([hit]);

        const h = hitResizeHandle(p.x, p.y, boxes[hit]);
        if (h) {
            drawMode = 'resize';
            resizeHandle = h;
            dragging = true;
            draw();
            return;
        }

        const b = boxes[hit];
        drawMode = 'move';
        dragging = true;
        dragOffset.x = p.x - b.x;
        dragOffset.y = p.y - b.y;
        draw();
        return;
    }

    // Draw new bbox on empty area
    hideClassPopup();
    const clsSel = document.getElementById('boxClassSelect');
    const defaultCls = Number.isNaN(parseInt(clsSel.value, 10)) ? 0 : parseInt(clsSel.value, 10);
    const newBox = { cls: defaultCls, x: p.x, y: p.y, w: 1, h: 1 };
    boxes.push(newBox);
    selectedBox = boxes.length - 1;
    selectedBoxes = new Set([selectedBox]);
    drawMode = 'draw';
    dragging = true;
    draw();
}

function onMouseMove(e) {
    if (!dragging || selectedBox < 0 || !boxes[selectedBox]) return;
    const p = canvasPointFromEvent(e);
    const b = boxes[selectedBox];

    if (drawMode === 'move') {
        b.x = clamp(p.x - dragOffset.x, 0, Math.max(0, drawW - b.w));
        b.y = clamp(p.y - dragOffset.y, 0, Math.max(0, drawH - b.h));
    } else if (drawMode === 'draw') {
        const x1 = clamp(dragStart.x, 0, drawW);
        const y1 = clamp(dragStart.y, 0, drawH);
        const x2 = clamp(p.x, 0, drawW);
        const y2 = clamp(p.y, 0, drawH);
        b.x = Math.min(x1, x2);
        b.y = Math.min(y1, y2);
        b.w = Math.max(1, Math.abs(x2 - x1));
        b.h = Math.max(1, Math.abs(y2 - y1));
    } else if (drawMode === 'resize') {
        let x = b.x, y = b.y, w = b.w, h = b.h;
        const right = b.x + b.w;
        const bottom = b.y + b.h;

        if (resizeHandle.includes('n')) y = clamp(p.y, 0, bottom - 1);
        if (resizeHandle.includes('w')) x = clamp(p.x, 0, right - 1);
        if (resizeHandle.includes('s')) h = clamp(p.y - b.y, 1, drawH - b.y);
        if (resizeHandle.includes('e')) w = clamp(p.x - b.x, 1, drawW - b.x);

        if (resizeHandle.includes('n')) h = Math.max(1, bottom - y);
        if (resizeHandle.includes('w')) w = Math.max(1, right - x);

        b.x = x; b.y = y; b.w = w; b.h = h;
    }

    draw();
}

function onMouseUp() {
    if (drawMode === 'draw' && selectedBox >= 0 && boxes[selectedBox]) {
        const b = boxes[selectedBox];
        if (b.w < 4 || b.h < 4) {
            boxes.splice(selectedBox, 1);
            selectedBox = boxes.length ? boxes.length - 1 : -1;
            selectedBoxes = selectedBox >= 0 ? new Set([selectedBox]) : new Set();
        }
    }
    dragging = false;
    drawMode = 'none';
    resizeHandle = '';
    draw();
}

function onDocumentMouseDown(e) {
    if (!classPopupState.visible) return;
    const popup = getClassPopupEl();
    if (popup && popup.contains(e.target)) return;
    if (canvas && e.target === canvas) return;
    hideClassPopup();
}

(function initCanvasEvents() {
    canvas = document.getElementById('editorCanvas');
    ctx = canvas.getContext('2d');

    canvas.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    document.addEventListener('mousedown', onDocumentMouseDown);
    document.addEventListener('keydown', onEditorKeyDown);
})();

(function initVirtualImageList() {
    const imageList = document.getElementById('imageList');
    if (!imageList) return;
    imageList.addEventListener('scroll', () => renderImageList());
})();

(function initLayoutRatio() {
    let start = 1.8;
    try {
        const saved = Number(localStorage.getItem('project_editor_left_fr'));
        if (!Number.isNaN(saved)) start = saved;
    } catch (e) {
        // ignore
    }

    const slider = document.getElementById('layoutRatio');
    if (slider) slider.value = String(start);
    applyLayoutRatio(start);
    window.addEventListener('resize', () => applyLayoutRatio(layoutLeftFr));
})();

(async function init() {
    try {
        await Promise.all([loadClasses(), loadImages()]);
    } catch (e) {
        setStatus(String(e.message || e));
    }
})();
</script>
