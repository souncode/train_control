<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TrainControl Login</title>
    <style>
        :root {
            --bg: #f3f6fb;
            --card: #ffffff;
            --line: #d8e0ec;
            --text: #1b2430;
            --muted: #5a6578;
            --primary: #1d66d2;
            --danger: #c03434;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at 15% 15%, #e9f1ff 0%, var(--bg) 45%);
            color: var(--text);
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        .card {
            width: min(420px, calc(100vw - 32px));
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(24, 46, 84, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 24px;
        }

        .sub {
            margin: 0 0 18px;
            color: var(--muted);
            font-size: 14px;
        }

        label {
            display: block;
            margin: 10px 0 6px;
            font-weight: 600;
            font-size: 13px;
        }

        input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 11px 12px;
            font-size: 14px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(29, 102, 210, 0.14);
        }

        .err {
            margin: 12px 0 0;
            color: var(--danger);
            font-size: 13px;
            min-height: 20px;
        }

        button {
            margin-top: 14px;
            width: 100%;
            border: 0;
            border-radius: 10px;
            padding: 11px 12px;
            background: var(--primary);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover { filter: brightness(1.05); }
    </style>
</head>
<body>
    <form class="card" method="post" action="/login">
        <h1>Đăng nhập</h1>
        <p class="sub">Nhập tài khoản để truy cập TrainControl.</p>

        <input type="hidden" name="next" value="{{ next_url }}">

        <label for="username">Tài khoản</label>
        <input id="username" name="username" type="text" autocomplete="username" required>

        <label for="password">Mật khẩu</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <button type="submit">Đăng nhập</button>
        <div class="err">{{ error }}</div>
    </form>
</body>
</html>
